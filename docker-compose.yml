services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-labnote}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-labnote}
      POSTGRES_DB: ${POSTGRES_DB:-labnote}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      POSTGRES_USER: ${POSTGRES_USER:-labnote}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-labnote}
      POSTGRES_DB: ${POSTGRES_DB:-labnote}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: /api
      VITE_PROXY_TARGET: http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
